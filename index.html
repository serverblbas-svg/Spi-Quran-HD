let currentTrackIndex = 0;
let isLiveMode = false;
const videoPlayer = document.getElementById('quranVideoPlayer');
const nowPlayingText = document.getElementById('nowPlayingText');
const playlistContainer = document.getElementById('playlist-container');
let hls = null;

// دروستکردنی دوگمەی سوورەتەکان بە شێوەی خۆکار لەناو لیستەکەدا
function generatePlaylistUI() {
    quranPlaylist.forEach((surah, index) => {
        const btn = document.createElement('button');
        btn.id = `surah-btn-${index}`;
        btn.innerText = surah.name;
        btn.style.cssText = "background: #f4f7f4; color: #2c5e2e; border: 1px solid #2c5e2e; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; text-align: right; transition: all 0.2s;";
        
        btn.onclick = () => playSurah(index);
        playlistContainer.appendChild(btn);
    });
}

// فەرمانی لێدانی سوورەتێکی دیاریکراو
function playSurah(index) {
    isLiveMode = false;
    currentTrackIndex = index;
    const surah = quranPlaylist[index];
    
    if (hls) { hls.destroy(); hls = null; } // کوژاندنەوەی ئێچ ئێڵ ئێس ئەگەر هەبێت
    
    videoPlayer.src = surah.url;
    videoPlayer.play().catch(e => console.log("لێدان پێویستی بە کلیکی بەکارهێنەرە"));
    
    updateUI();
}

// فەرمانی لێدانی پەخشی ڕاستەوخۆ (M3U8)
function playLive(url) {
    isLiveMode = true;
    if (hls) { hls.destroy(); }
    
    if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(videoPlayer);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            videoPlayer.play();
        });
    } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
        videoPlayer.src = url;
        videoPlayer.play();
    }
    
    nowPlayingText.innerText = "📺 ئێستا: پەخشی ڕاستەوخۆ کاردەکات";
    resetButtonStyles();
}

// کاتێک ڤیدیۆیەک تەواو دەبێت، ئەم بەشە خۆکارانە کار دەکات
videoPlayer.onended = function() {
    if (!isLiveMode) {
        currentTrackIndex++; // دەچێتە سەر سوورەتی داهاتوو
        
        // ئەگەر گەیشتە دوای سوورەتی کۆتایی (الناس)، دەگەڕێتەوە بۆ سەرەتا (الفاتحة)
        if (currentTrackIndex >= quranPlaylist.length) {
            currentTrackIndex = 0; 
        }
        
        playSurah(currentTrackIndex);
    }
};

// گۆڕینی ڕەنگی دوگمەی ئەو سوورەتەی ئێستا لێدەدات
function updateUI() {
    resetButtonStyles();
    const activeBtn = document.getElementById(`surah-btn-${currentTrackIndex}`);
    if (activeBtn) {
        activeBtn.style.background = "#8c763e";
        activeBtn.style.color = "#ffffff";
        nowPlayingText.innerText = `🎵 ئێستا لێدەدات: ${quranPlaylist[currentTrackIndex].name}`;
        activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
}

function resetButtonStyles() {
    quranPlaylist.forEach((_, index) => {
        const btn = document.getElementById(`surah-btn-${index}`);
        if (btn) {
            btn.style.background = "#f4f7f4";
            btn.style.color = "#2c5e2e";
        }
    });
}

// دەستپێکردنی بەرنامەکە
generatePlaylistUI();
// بە شێوەی دیفۆڵت لە سوورەتی فاتیحەوە دەستپێدەکات کاتێک سایتەکە دەبێتەوە
playSurah(0);
